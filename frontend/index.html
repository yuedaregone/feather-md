<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' feather:; style-src 'self' feather: 'unsafe-inline'; script-src 'self' feather: 'unsafe-eval'; img-src 'self' feather: data: file:;">
  <title>FeatherMD</title>
  <link rel="stylesheet" href="markdown.css">
  <link rel="stylesheet" href="themes/github-light.css" id="theme-link">
  <link rel="stylesheet" href="custom-styles.css">
</head>
<body>
  <div id="app">
    <div id="content"></div>
  </div>

  <!-- 右键菜单 -->
  <div id="context-menu" class="context-menu hidden">
    <div class="menu-item" data-action="copy">复制</div>
    <div class="menu-item" data-action="copy-md">复制为 Markdown</div>
    <div class="menu-separator"></div>
    <div class="menu-item has-submenu">
      切换主题 ▸
      <div class="submenu">
        <div class="menu-item" data-action="theme" data-theme="github-light">GitHub Light</div>
        <div class="menu-item" data-action="theme" data-theme="github-dark">GitHub Dark</div>
        <div class="menu-item" data-action="theme" data-theme="one-dark">One Dark</div>
        <div class="menu-item" data-action="theme" data-theme="nord">Nord</div>
      </div>
    </div>
    <div class="menu-separator"></div>
    <div class="menu-item" data-action="zoom-in">字体放大</div>
    <div class="menu-item" data-action="zoom-out">字体缩小</div>
    <div class="menu-item" data-action="zoom-reset">重置缩放</div>
    <div class="menu-separator"></div>
    <div class="menu-item" data-action="open-folder">打开所在文件夹</div>
    <div class="menu-item" data-action="open-editor">用编辑器打开</div>
  </div>

  <!-- 错误页面 -->
  <div id="error-page" class="hidden">
    <div class="error-container">
      <div class="error-icon">📄</div>
      <h2 id="error-title">无法打开文件</h2>
      <p id="error-message"></p>
      <button id="error-retry">选择文件</button>
    </div>
  </div>

  <script src="js/marked.min.js"></script>
  <script src="js/highlight.min.js"></script>
  <script src="js/mermaid.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
